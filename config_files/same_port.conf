##### Configuration example ####

http{
# Server Block
    server {
        listen 8080;
        server_name www.websurfers.com;

        # Root directory
        root /html;

        error_page 404 /404.html;
        error_page 500 502 503 /50x.html;

        # Index files
        index index.html index.htm;

        autoindex on;

        client_max_body_size 1540000000;

        # Redirection (301, 302, etc.)
        location /old-path/ {
            return 301 http://localhost:8080/html/redirect.html;
        }

        location / {
            root /html;

            autoindex on;
            
            client_max_body_size 1540000000;

            error_page 404 /error_pages/404.html;
            error_page 405 /error_pages/405.html;
            error_page 500 502 503 /custom_50x.html;
            error_page 504 /error_pages/504.html;

            limit_except GET POST DELETE{
                deny all;
            }
        }

        location /cgi-bin/ {
	
            limit_except GET POST {
                deny all;
            }
            root /html;
            cgi_pass /usr/bin/python3;
        }
    }

    server {
        listen 8080;
        server_name www.hey.com;

        # Root directory
        root /var/www/html;

        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;

        autoindex on;

        client_max_body_size 100;

        # Redirection (301, 302, etc.)
        location /old-path/ {
               return 301 http://localhost:7000/html/redirect.html;
        }

        location / {
            root /html;

            index index2.html;

            autoindex on;

            client_max_body_size 1540000000;

            error_page 404 /error_pages/404.html;
            error_page 405 /error_pages/405.html;
            error_page 500 502 503 504 /custom_50x.html;

            limit_except GET POST DELETE{
                deny all;
            }
        }

        location /cgi-bin/ {
	
            limit_except GET POST {
                deny all;
            }
            root /html;
            cgi_pass /usr/bin/python3;
        }
    }
}
