<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>504 Gateway Timeout</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #333;
    }

    .container {
      text-align: center;
      padding: 2rem;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    .status-code {
      font-size: 6rem;
      font-weight: bold;
      color: #d9534f;
    }

    .message {
      font-size: 1.5rem;
      margin: 1rem 0;
    }

    .description {
      color: #666;
      margin-bottom: 2rem;
    }

    .home-button {
      text-decoration: none;
      background: #007bff;
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      transition: background 0.3s ease;
    }

    .home-button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="status-code">504</div>
    <div class="message">Gateway Timeout</div>
    <div class="description">
      The server didn't respond in time. This could be a temporary issue.<br>
      Please try again later or return to the homepage.
    </div>
    <a href="/" class="home-button">Go to Homepage</a>
  </div>
</body>
</html>
